version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: infomatt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: infomatt
      POSTGRES_PASSWORD: infomatt_dev_password
      POSTGRES_DB: infomatt
    ports:
      - "5432:5432"
    volumes:
      - infomatt_postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: infomatt_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: infomatt_backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://infomatt:infomatt_dev_password@postgres:5432/infomatt
      JWT_SECRET: change_me_in_production
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
    container_name: infomatt_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  infomatt_postgres_data:
